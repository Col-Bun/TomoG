<!-- Frutiger Metro / FSR Style Background -->
<div class="metro-bg">
  <div class="metro-sunburst"></div>
  <div class="metro-halftone"></div>
  <div class="metro-vectors">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      
      <!-- Thick solid Frutiger Metro ribbons -->
      <path d="M-100 700 Q 400 400, 900 800 T 1600 500 L 1600 1000 L -100 1000 Z" fill="#000" fill-opacity="0.15" />
      <path d="M-100 750 Q 500 300, 1000 750 T 1600 400 L 1600 1000 L -100 1000 Z" fill="#fff" fill-opacity="0.25" />
      
      <!-- Stark horizontal banding -->
      <rect x="0" y="120" width="100%" height="40" fill="#fff" fill-opacity="0.15" />
      <rect x="0" y="140" width="100%" height="8" fill="#000" fill-opacity="0.2" />

      <!-- Giant abstract target circle -->
      <circle cx="1200" cy="750" r="180" fill="none" stroke="#fff" stroke-width="40" stroke-opacity="0.15" />
      <circle cx="1200" cy="750" r="60" fill="#000" fill-opacity="0.1" />

      <!-- Y2K Flat Silhouette Flowers -->
      <!-- White Flower Top Left -->
      <g class="y2k-flower spin-f1" transform="translate(150, 200) scale(1.5)" fill="#fff" fill-opacity="0.3">
        <circle cx="0" cy="-20" r="15"/><circle cx="19" cy="-6" r="15"/><circle cx="12" cy="16" r="15"/><circle cx="-12" cy="16" r="15"/><circle cx="-19" cy="-6" r="15"/>
        <circle cx="0" cy="0" r="12" fill="#ff1e78" fill-opacity="1"/>
      </g>

      <!-- Black Silhouette Flower Right -->
      <g class="y2k-flower spin-f2" transform="translate(1300, 250) scale(2)" fill="#000" fill-opacity="0.15">
        <circle cx="0" cy="-20" r="15"/><circle cx="19" cy="-6" r="15"/><circle cx="12" cy="16" r="15"/><circle cx="-12" cy="16" r="15"/><circle cx="-19" cy="-6" r="15"/>
        <circle cx="0" cy="0" r="12" fill="#fff" fill-opacity="0.3"/>
      </g>

      <!-- Small White Flower Bottom Left -->
      <g class="y2k-flower spin-f3" transform="translate(250, 750) scale(1.2)" fill="#fff" fill-opacity="0.4">
        <circle cx="0" cy="-20" r="15"/><circle cx="19" cy="-6" r="15"/><circle cx="12" cy="16" r="15"/><circle cx="-12" cy="16" r="15"/><circle cx="-19" cy="-6" r="15"/>
        <circle cx="0" cy="0" r="12" fill="#ff1e78" fill-opacity="1"/>
      </g>

    </svg>
  </div>
</div>
