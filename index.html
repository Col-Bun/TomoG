<style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

    .numogram-container {
        display: flex;
        flex-wrap: wrap;
        gap: 30px;
        width: 100%;
        align-items: flex-start;
        font-family: 'Nunito', sans-serif;
        color: #e0e0e0;
    }

    .numogram-wrapper {
        flex: 1 1 500px; /* Allows it to scale nicely inside your existing layout */
        background: #000;
        border-radius: 20px;
        position: relative;
        box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        border: 2px solid rgba(255,50,50,0.3);
        overflow: hidden;
        aspect-ratio: 1;
    }

    .numogram-wrapper svg {
        width: 100%;
        height: 100%;
        display: block;
    }

    .zone-group {
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .zone-group:hover circle:first-child {
        fill: #1a1a1a;
        stroke: #ff3c8e;
        filter: drop-shadow(0 0 15px rgba(255, 60, 142, 0.8));
    }

    .info-panel {
        flex: 1 1 400px;
        background: rgba(20, 0, 0, 0.6);
        border: 2px solid #ff3333;
        border-radius: 16px;
        padding: 24px;
        box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        height: calc(100vh - 150px); /* Adjusted to account for your top nav bar */
        max-height: 800px;
        overflow-y: auto;
    }

    .info-panel::-webkit-scrollbar {
        width: 8px;
    }

    .info-panel::-webkit-scrollbar-thumb {
        background: #ff3333;
        border-radius: 4px;
    }

    .info-panel h2 {
        color: #ff3c8e;
        margin-bottom: 12px;
        font-size: 1.8rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-top: 0;
    }

    .info-panel h3 {
        color: #a8e84c;
        margin-top: 20px;
        margin-bottom: 8px;
        font-size: 1.2rem;
        border-bottom: 1px solid rgba(168,232,76,0.3);
        padding-bottom: 4px;
    }

    .info-panel p {
        font-size: 0.95rem;
        color: rgba(255,255,255,0.85);
        margin-bottom: 12px;
        line-height: 1.6;
    }

    .info-panel ul {
        margin-left: 20px;
        margin-bottom: 12px;
        color: rgba(255,255,255,0.85);
    }

    .info-panel li {
        margin-bottom: 6px;
    }
</style>

    const introData = `
    <h2>The Decimal Numogram</h2>
    <p>Pandemonium is the complete system of Lemurian demonism and time sorcery. It consists of two principal components: Numogram (time-map) and Matrix (listing the names, numbers and attributes of the demons).</p>
    <p>The system is constructed according to immanent criteria latent in decimal numeracy, and involves only basic arithmetical operations (assembled from additions and subtractions).</p>
    <p>The Numogram, or Decimal Labyrinth, is composed of ten zones (numbered 0-9) and their interconnections. These zones are grouped into five pairs (syzygies) by nine-sum twinning [zygonovism]. The arithmetical difference of each syzygy defines a current (or connection to a tractor zone). Currents constitute the primary flows of the numogram.</p>
    <p>Each zone number when digitally cumulated defines the value of a gate, whose reduction sets the course of a corresponding channel. Channels constitute the secondary flows, time-holes, or secret interconnections of the numogram.</p>
    <p>The arrangement of currents divides the Maze into three basic time-systems. Firstly, the currents of the three central syzygies mutually compose a cycle, rotating in anticlockwise steps. Lemurian sorcery calls this inner loop the Time-Circuit. Secondly, and thirdly, in both the Upper and the Lower syzygies the currents produced fold back into (a half of) themselves, constituting autonomous loops: the Warp (upper), and Plex (lower). Warp and Plex circuitries are of an intrinsically cryptic nature, which is compounded by the enigmas of their interconnection. They are variously considered to be Outside- or Outer-time.</p>
    <p>The gates and their channels knit the Maze together, providing connections between otherwise incompatible time-systems. They open and close the ways of sorcerous traffic. Although each gate deranges time in its own way, their operations vary with a certain regional consistency.</p>
    <h3>1. Numogram and Otz Chaiim</h3>
    <p>To those familiar with the Western Magical Tradition, it is likely that the Numogram will initially evoke the Qabbalistic Tree of Life. Both are constructed as decimal diagrams, involving webs of connectivity between ten basic zones, mysteriously twisted into a cryptic ultra-cycle (that links upper and lower regions). Both treat names as numbers, and numerize by digital reduction and cumulation. Both include passages across abysmal waters and through infernal regions. Both map zones onto spinal levels.</p>
    <p>Despite these manifold interlinkages, there are compelling reasons to consider the Tree of Life a scrambled variant of the Numogram, rather than a parallel system. During its long passage through Atlantean and post-Atlantean hermetic traditions the systematic distortions of the Numogram (introduced to confuse the uninitiated) gradually hardened into erroneous doctrines, and a dogmatic image of the Tree.</p>
    <p>Most evidently, a vulgar distribution of the numbers - in their exoteric counting-order - was substituted (redundantly) for the now esoteric numogrammatical distribution, which proceeds in accordance with immanent criteria (the web emerging qabbalisitically from the zone-numbers themselves). More devastatingly, the orginal consistency of numeracy and language seems to have been fractured at an early stage, introducing a division between the number of the Sephiroth (10) and that of the Hebrew alphabet (22). The result was a break between the nodes of the tree and the interconnecting paths, ruining all prospect of decipherment. The Sephiroth -segmented over-aganist their connections - become static and structural, whilst the paths lose any rigorous principle of allocation. A strictly analogous outcome is evident in the segmentation of the Tarot into Major and Minor Arcana. Increasingly desperate, arbitrary, and mystifying attempts to re-unite the numbers and their linkages seems to have bedevilled all succeeding occult traditions.</p>

    <h2>Zone Four</h2>
    <h3>The Numeral 4</h3>
    <p>There are two basic versions of the figure, one ‘open' and the other closed into a triangle. The former design is echoed in the symbol for the planet Jupiter. It is the latter (instantiated here) that figurally relates four to the sign for delta (fourth letter of the Greek alphabet), and accounts for the fact that in certain hacker numerolects it is substituted for the (upper-case) letter ‘A.'</p>
    <p>The figure ‘4' designates the number four, the second even number, and first non-prime (or complex) natural number, with prime factors of 2 x 2. (The fourth prime = 7).</p>
    <p>The triangular summation - or digital cumulation - of four equals ten (numerologically identified with a superior power of unity, classically conceived as the pythagorean Tetrakys). The pre-eminences of four - as ‘first' non-prime and ‘first' square - are formally or germinally anticipated by unity.</p>
    <p>Four digitally cumulates to ten (see above).</p>
    <p>Numeric Keypad direction: West.</p>
    <p>Due to the internal redundancy of its dual symmetry (2 x 2 = 2 + 2 = 4), four is commonly conceived as the model outcome of calculation - as indicated by the phrase ‘putting two and two together.'</p>
    <p>The dominant associations of the number four are balance and stability, exemplified by the ‘four-square' - or solidary - structure of four walls, wheels, or quadrupedal support, as well as by the ‘four-four beats' of rigidly metric dance-music. It is this sense of quadrature that predominates in the four elements (earth, air, water, fire), the four cardinal directions (north, south, east, and west), and the four DNA bases (adenine, cytosine, guanine, and thymine). A similar fourfold typology is expressed by the four suits of the playing-card pack (clubs, diamonds, hearts, spades). Four is also associated with temporal stability - or cyclic regeneration - , as evidenced by the four seasons (Spring, Summer, Autumn, Winter), four classical ages (those of gold, silver, bronze, and lead), and in Hindu culture, far more intricately, by the four Yugas (those of Krita, Treta, Dvapara, and Kali). The system of the Yugas is a fully elaborated quadro-decimal system (highly suggestive in relation to the Tetrakys).</p>
    <p>Within the Judaeo-Christian tradition the number four is invested with extraordinary significance, from the four letters of the Tetragrammaton, through the four gospels, to the four great ‘Zoas' and four horsemen of apocalypse. The biblical time - of both old and new testaments - places particular importance on the period of forty days (e.g. the duration of the flood, and of Jesus' temptation in the desert). This privileging of quadrate order - as the ground-plan of the temple - is also instantiated by the masonic ‘square.'</p>
    <p>The number four is also of special importance to Buddhism, as exemplified by the ‘four noble truths' of its basic doctrine, and by the typical (quadrate) design of the mandala. On the flip-side the number four is connected with excess (the fourth dimension), anomaly (the four-leafed clover), and vulgarity (four-letter words).</p>
    <h3>The Fourth Planet: Mars</h3>
    <p>Mars (or Sol-4) has a mean orbital distance from the sun of approx. 228 000 000 km. The Martian year is roughly twice as long as that of Earth, and its day about 30 minutes longer.</p>
    <p>Mars has two moons, Phobos and Deimos.</p>
    <p>The surface of Mars is swept by vast dust-storms that occasionally envelop the whole planet for months.</p>
    <p>In popular legend Mars has long been envisaged as the home of intelligent alien life. Recent examples include the ‘canals' discovered by Percival Lowell, the fictions of H.G. Wells and Edgar Rice Burroughs, and the Cydonia ‘face' (based on images from the 1976 Viking missions). Mars is widely seen as a plausible candidate for human colonization. It has also become notorious for cursed space-missions.</p>
    <p>In August 1996 scientists announced the discovery of Martian nanoworms in a ancient meteorite (cat. ALH84001).</p>
    <p>In Roman mythology Mars (a latinization of the Greek Ares) is the god of war, and father of Romulus (legendary founder of Rome). Mars is commemorated by the month of March.</p>
    <p>In Lemurian Planetwork Mars is astrozygonomously paired Jupiter.</p>
    <h3>System Notes</h3>
    <p>Zone-4 is the third of the six Torque-region Zones of the Numogram. Its Syzygetic-twin is Zone-5. The 5+4 Syzygy is carried by the demon Katak (see Zone-5).</p>
    <p>Zone-4 both initiates and envelops the Fourth-Phase of Pandemonium (including 16 impulse-entities). This equation of phase-population with the square of the zone-number establishes an exceptional solidarity between the two, although this rigidity has as its flip-side a tendency to cataclysmic instability. In its initiatory aspect Zone-4 functions as the Fourth Door (or 'Time-Delta,' familiar from variations of the Kurtz-mythos as 'the worst place in the world'). Muvian sorcery attributes this door to the amphidemon (and imp of the first degree) Krako (4::0).</p>
    <p>The Fourth Gate (Gt-10) feeds Zone-4 forward to Zone-1. Its ancient (proto-Atlantean) name the 'Gate of Submergence' hints at its interlocking associations with completion, catastrophe, subsidence, and decadence. The Channel corresponding to the Fourth Gate is one of three concluding in Zone-1, and the only pro-cyclic channel within the Torque. Its course reinforces the 5-4 (or 'Sink') Current in its rush towards termination, and augments the weight of destiny (it was under the influence of this line that Cecil Curtis departed upon his fatal journey into the land of the Tak Nma).</p>
    <p>Zone-4 is allotted the Sarkonian Mesh-Tag 0015.</p>
    <p>Lemurian subcultures associate Zone-4 with ‘delta-phase’ or terminal deliria (Kurtz/Curtis end-of-the-river disintegration into malarial nightmares), geoconvulsions, continental subsidence, and ‘red-out.’</p>
    <p>Centauri subdecadence maps Zone-4 onto the passive side of the Third (or Left) Pylon on the Atlantean Cross. As the dark aspect of Apocalypse (‘destructive influences’) it corresponds to random calamity.</p>
    <p>Stillwell links Zone-4 to the Munumese quasiphonic particle ‘skr,’ which Horowitz identifies as an anthropo-reptiloid precursor to the qabbalistic ‘hard resh.’</p>
    <p>Stillwell’s ethno-topography of the Nma allocates Zone-4 to the volcanic jungles of the Tak Nma, and through the Mu Nma hydrocycle mythos to riverine flow.</p>
    <p>Zone-4 totem animals are typified by cats and dogs, especially in their predatory mode. Among the Tak Nma rabid animals are given particular prominence.</p>

    <h2>Zone Five</h2>
    <h3>The Numeral 5</h3>
    <p>The figure five (5) - echoed by the (upper-case) letter ‘S' - is of the ophidian-symmetric type (see ‘two').</p>
    <p>The still widely used Roman numeral V (upper-case letter ‘V') - despite appearing as a quasi-alphabetical numeral - is actually a numerical figure of a far older type, exhibiting a vestigial link to pre-symbolic tallying systems (such as the ‘five-bar gate' (see ‘one')).</p>
    <p>The figure ‘5' designates the number five, the third odd number (with odditude of 2), and the third prime (fifth prime = 11).</p>
    <p>Five is one of the two prime factors of the decimal module (with two), a fact that is usually attributed to the number of fingers on one hand. It is on this basis that five serves as modulus or submodulus in many counting (and currency) systems.</p>
    <p>Five digitally cumulates to fifteen.</p>
    <p>Numeric Keypad direction: Centre.</p>
    <p>The number five has particularly strong anthropomorphic associations, due to its multiple connections with human biological organization. These are not restricted to the five digits per limb (so crucial to the social history of numeracy), but extend also to structural dimensions as varied as the five senses (sight, hearing, smell, taste, and touch), and the five spinal-levels (coccygeal, sacral, lumbar, dorsal, cervical). These anthropomorphic resonances are disturbed, however, by instances of fundamentally pentagonal body-plans - pre-eminently that of the star-fish - which is intrinsic to the aberrancy of the Lovecraftean Old Ones.</p>
    <p>In monotheistic traditions the number five is associated with doctrinal authority, as evidenced in the Pentateuch (or five books of Moses), and in the five pillars of Islam (the ‘arkan,' or five ritual duties).</p>
    <p>In occult circles the importance of the number five is even more emphatic, as indicated by the five elements of Chinese alchemy, and by the designs of the pentagram, the pentazygon, and the the Atlantean Cross (with its five ‘stations').</p>
    <p>Secular relics of the authoritative sense of five can be found in the ‘Five-year plans' of command economies, in the geopolitical symbolism of The Pentagon, and perhaps in the near-universal prestige invested in Intel's ‘Pentium' processor.</p>
    <h3>The Fifth Planet: Jupiter</h3>
    <p>Jupiter (or Sol-5) has a mean orbital distance from the sun of approx. 778 330 000 km. The Jovian year is roughly 11.9 Earth years in length, and its day about 9.9 hours long.</p>
    <p>Jupiter is the innermost gas-giant, and by far the largest planet in the Solar-system, accounting on its own for more than two-thirds of total planetary mass. It has an extremely powerful magnetic field (its magnetosphere extends beyond the orbit of Saturn).</p>
    <p>Jupiter has sixteen moons. The four largest (or Galilean) moons are Callisto, Europa, Ganymede, Io. Galileo's observations of these bodies provided crucial evidence for the Copernican revolution. The oceans of Europa have been frequently identified as potential habitations for alien life (a neomyth shared by Arthur C Clarke, who also populated Jupiter with his alien ‘Monoliths').</p>
    <p>The most distinctive feature on the Jovian surface is the Great Red Spot, a vast self-sustaining storm.</p>
    <p>The size, position, and orbital regularity of Jupiter has led to it being credited with a crucial role in protecting the inner solar-system from meteoritic and cometary bombardment.</p>
    <p>Jupiter (or Jove, latinizing the Greek Zeus) is the sovereign of the Gods. As god of the sky, and of storms, he has been systematically cross-identified with the Abrahamic Jehovah.</p>
    <p>In Lemurian Planetwork Jupiter is astrozygonomously paired with Mars. (Between Mars and Jupiter lies the asteroid belt, widely hypothesized to be the fragments from a destroyed intermediate planet).</p>
    <h3>System Notes</h3>
    <p>Zone-5 is the sixth of the six Torque-region Zones of the Numogram, and Tractor-Zone of the 7-2 (or 'Hold') Current. Its Syzygetic-twin is Zone-4. This 5+4 Syzygy (carried by the demon Katak) draws the innermost curve of the Barker-spiral, with Zone-5 itself marking its central and terminal node (or 'inner-eye').</p>
    <p>Zone-5 both initiates and envelops the Fifth-Phase of Pandemonium (including 32 impulse-entities). Horovitz remarks specifically upon the qabbalistic resonance of these values. In its initiatory aspect Zone-5 functions as the Fifth (or Hyperborean) Door, attributed by Muvian sorcery to the amphidemon (and imp of the first degree) Tokhatto (5::0). In the inner esoteric circles of the AOE this demon is reverenced as the Angel of the Decadence Pack, and even identified with the Archangel Meteka (associations reinforced by numerous qabbalistic peculiarities).</p>
    <p>The Fifth Gate (Gt-15) connects Zone-5 to Zone-6, and its corresponding channel tracks the path of abductions into the Warp.</p>
    <p>Zone-5 is allotted the Sarkonian Mesh-Tag 0031.</p>
    <p>Lemurian subcultures associate Zone-5 with Hyperborean or Wendigo mythology. Zone-5 mirrors Zone-2 and shares in its Crypt-linked themes of missing time and alien abduction.</p>
    <p>Centauri subdecadence maps Zone-5 onto the active side of the Third (or Left) Pylon on the Atlantean Cross. As the light aspect of Apocalypse (‘destructive influences’) it corresponds to decision, judgement, and war.</p>
    <p>Stillwell links Zone-5 to the Munumese quasiphonic particle ‘ktt’ (the Horowitzean ‘paravocal tic’).</p>
    <p>Stillwell’s ethno-topography of the Nma allocates Zone-5 to the upland rain forests of the Tak Nma, and through the Mu Nma hydrocycle mythos to the monsoon.</p>
    <p>Zone-5 totem animals are predominantly hybrid bird-reptile forms (with the art of the Highland Tak described by Cecil Curtis as ‘a flapping howling chaos of flying worms, bat-monsters and barking snakes’).</p>

    <h2>Zone Six</h2>
    <h3>The Numeral 6</h3>
    <p>The figure six (6) is rotationally equivalent to the numeral ‘9' (the two figures together composing a system of twin-spirals). Six participates in a figural set - including the (lower-case) letters b, d, and q, plus (upper- and lower-case) P - of particular and distinct interest to figural grammarians, who have suggested that the ur-form of both six and nine were continuously involutionary spirals.</p>
    <p>The figure ‘6' designates the number six, third even number, and second non-prime (with prime-factors 2 and 3).</p>
    <p>Six is the first ‘perfect' number, equivalent to the sum of its factors (1, 2, and 3), and revered as such by Pythagoras.</p>
    <p>Six digitally cumulates to twenty-one.</p>
    <p>Numeric Keypad direction: East.</p>
    <p>Despite its ‘perfection,' six is perhaps the darkest of the elementary decimal numbers, due to its association with chance (the six faces of the die), ill-omen (indicated by the ambivalence of the word or prefix ‘Hex'), and occult intuition (the ‘sixth sense').</p>
    <p>The six lines of the I Ching hexagram designate the six stages of change discovered by archaic Taoism (which are numerically equivalent to the cyclic-sequence of digitally reduced binary-powers, with values: 1, 2, 4, 8, 7, 5).</p>
    <p>In the Christian world the number six is ominously coloured by its triplicate reiteration - 666 (or six hundred three-score and six), the Number of the Beast of Revelation - which has preoccupied Christian qabbalism throughout the greater part of the last two Millennia. Six-hunded and sixty-six is the triangular cumulation of thirty-six (itself the second power of six). The division of modern bar-codes into blocks punctuated by (three) sixes has been taken by some as an uncanny fulfillment of the biblical prophecy [Rev XIII:17] 'that no man might buy or sell, save he that had the mark, or the name of the beast, or the number of his name.' (Since thirty-six is the digital cumulation of eight, however, it is to that number - and not six - that this entire complex should ultimately be referred).</p>
    <p>The number sixty (60) - decimal escalation of six - has acquired prominence due to its extraordinary and influential importance to Sumero-Babylonian culture, from whom the modern world has inherited the sexigesimal principle of division (into minutes and seconds) still current within both chronometry and geometry.</p>
    <h3>The Sixth Planet: Saturn</h3>
    <p>Saturn (or Sol-6) has a mean orbital distance from the sun of approx. 1 429 400 000 km. The Saturnian year is a little over 29.47 earth-years in length, and its day has a length of roughly 10.18 hours on the surface (which is half an hour less than that of its solid core).</p>
    <p>The Saturnian ring-system is divided into seven major bands (labelled D, C, B, A, F, G, E since Huygens), and actually consists of more than 100 000 component rings.</p>
    <p>Saturn has eighteen confirmed (and named) moons, although the total might be as high as thirty-two. The largest moon - Titan - is more massive than Mercury.</p>
    <p>Saturn has a magnetic field. Its magnetosphere is about one-third the size of Jupiter's. It is the least dense of the planets (with an average density lower than that of water). A huge standing wave pattern around the northern polar region produces the appearance of a permanent hexagon.</p>
    <p>The Roman god Saturn is identified with the Greek Cronos, god of time, and father of Jupiter, Neptune, and Pluto (amongst the planetary deities). Saturn is celebrated in the seven days of Saturnalia (the Roman Winter-festival), and in the name of Saturday.</p>
    <p>In Lemurian Planetwork Saturn is astrozygonomously paired with Earth.</p>
    <h3>System Notes</h3>
    <p>Zone-6 is the second of the two Warp-region Zones of the Numogram. Its Warp-complement and Syzygetic-twin is Zone-3. It is this 6+3 Syzygy (carried by the demon Djynxx) which draws the 'Ulterior Vortex' of Outer-Time. Zone-6 provides the terminus for two channels, one each from the Torque (the 5th), and the Warp (the 3rd).</p>
    <p>Zone-6 both initiates and envelops the Sixth-Phase of Pandemonium (including 64 impulse-entities). Chaim Horovitz qabbalistically relates this phase, multitude, or 'Tone' to the hexagrams of the I Ching and to the yantras of the Ur-Oriyan Yoginis. As initiator, Zone-6 corresponds to the Sixth Door. Muvian sorcery attributes this door - which it names Undu - to the terrible chaotic xenodemon (and imp of the first degree) Tchu (6::0), primordially associated with shocking disappearances.</p>
    <p>The Sixth Gate (Gt-21) twists Zone-6 through Zone-3, vortically recycling it into the Warp. Its corresponding channel tracks the course of the Warp-current, reinforcing the turbular-momentum of the entire region.</p>
    <p>Mu Tantrism plots Warp-region intensities onto the plane of the third-eye.</p>
    <p>Zone-6 is allotted the Sarkonian Mesh-Tag 0063 (a fact of obvious importance to the culture of Tzikvik cipher-shamanism).</p>
    <p>Lemurian subcultures associate Zone-6 with the occulted dimensions of Undu, turbular erosion and the dead eye of the cyclone. The intensity of vortical involvement with Zone-3 problematizes distinct characterization.</p>
    <p>Centauri subdecadence maps Zone-6 onto the passive side of the Fourth (or Crown) Pylon on the Atlantean Cross. As the dark aspect of Fortune (‘far future’) it corresponds to ‘gnostic death,’ event horizon, and the absolutely unexpected.</p>
    <p>Stillwell links Zone-6 to the Munumese quasiphonic particle ‘tch,’ approximating to the interphoneme ‘dzch/tj.’</p>

    <h2>Zone Seven</h2>
    <h3>The Numeral 7</h3>
    <p>The figure seven (7) includes the only pure diagonal to be found amongst the numeral figures (and depends upon this oblique line to differentiate it from the numeral ‘1,' as also to break it's rotational bond with the (upper-case) letter ‘L'). It is ideographically connected to the lightning-stroke, and related by composition to the (similarly associated) letter ‘Z.'</p>
    <p>The figure ‘7' designates the number seven, the fourth odd number (with odditude of one), and the fourth prime (seventh prime = 17).</p>
    <p>Seven digitally cumulates to twenty-eight.</p>
    <p>Numeric Keypad direction: North-West.</p>
    <p>The biblical importance of the number seven is established at the beginning of Genesis, with the religious derivation of the seven-day week (from the six days of creation +1). Jewish mysticism deepens this association between seven and sacred time with an account of seven discarded creations (preceding the current one, and cast into the abyss). The number seven is also notably prominent in Revelation (where it is referred to the seven ancient churches, to the seven angels, seven seals, seven last plagues, seven vials of wrath, and to the seven heads of the great beast (which perhaps refer - in turn - to the seven hills of Rome)). The heptamania of Revelation is the probable source of the structurally ambivalence of seven within popular Christianity, where it is attributed both to the seven cardinal virtues, and the seven deadly sins.</p>
    <p>A crescendo of seven-obsession is found in the Theosophical writings of Madame Blavatsky, who divides the cosmic process into seven phases, each characterized by one of seven sequential ‘root races.' Blavatsky draws from biblical sources, but is more directly influenced (through the teachings of her ‘Ascended Tibetan Masters') by the usage of the number seven in a variety of Eastern religions (including the Hindu seven worlds, seven divine mothers, and seven Rishis - or sages -, the seven Buddhas, and the seven Shinto gods of good fortune).</p>
    <p>Religious and mystical investments of the number seven are closely connected to the seven planets of classical astronomy and traditional astrology (from which the phrase ‘seventh heaven' is derived). In recent times, the Seven Sisters (or Pleiades) have taken up an increasing proportion of this cosmic-numerical freight.</p>
    <p>The triplicate reiteration of the number seven is used as the title for Alistair Crowley's book of numbers, 777 (a number corresponding to the gematria value of the law of Thelema according to Alphanumeric Qabbala).</p>
    <h3>The Seventh Planet: Uranus</h3>
    <p>Uranus (or Sol-7) has a mean orbital distance from the sun of approx. 2 870 990 000 km. The Uranian year is a little over 84 Earth-years in length. Its day lasts for roughly seventeen and one quarter hours.</p>
    <p>Uranus has five large moons, plus at least ten smaller ones. The two largest moons - Oberon and Titania - were discovered by Herschel in 1787. It also has a ring-system involving eleven known bands (the five most prominent of these are designated by the Greek letters from Alpha to Epsilon).</p>
    <p>The rotation of Uranus is abnormally tilted, and is almost perpendicular to the ecliptic, warping its magnetic field.</p>
    <p>The bluish colour of Uranus is ascribed to absorption of red-light by atmospheric methane.</p>
    <p>In Greek mythology Uranus was the god of the heavens, incestuous son of Gaia and father of Cronos (Saturn), the other Titans, the Cyclops, the hundred-headed giants, and others. Led by Cronos, the Titans killed and mutilated Uranus, spawning the Furies from his blood (and Aphrodite from his severed genitals).</p>
    <p>In recent times Uranus has become the butt of infantile scatalogical humour.</p>
    <p>In Lemurian Planetwork Uranus is astrozygonomously paired with Venus.</p>
    <h3>System Notes</h3>
    <p>Zone-7 is the fifth of the six Torque-region Zones of the Numogram, and Tractor-Zone of the 8-1 (or 'Surge') Current. Its Syzygetic-twin is Zone-2. The 7+2 Syzygy is carried by the demon Oddubb, whose associations with hyperstitious doublings reinforces its twin character.</p>
    <p>Zone-7 both initiates and envelops the Seventh-Phase of Pandemonium (including 128 impulse-entities). In its initiatory aspect - as the Seventh Door - Zone-7 opens onto the cosmic swamp-labyrinths or 'Tracts of Dobo.' Muvian sorcery attributes this door to the amphidemon (and imp of the first degree) Puppo (7::0).</p>
    <p>The Seventh Gate (Gt-28) feeds Zone-7 back to Zone-1, and this tendency to precipitate 'fold-type' time-anomalies accounts for its Black-Atlantean name 'Gate of Relapse.' The Channel corresponding to the Seventh Gate is one of three concluding in Zone-1, and the only counter-cyclic path within the Torque. The aquassasins of Hyper-C fetishize this gate in their bizarre mysteries of the Bubble Pod.</p>
    <p>Zone-7 is allotted the Sarkonian Mesh-Tag 0127.</p>
    <p>Lemurian subcultures associate Zone-7 with emergence from the depths (hyper-sea water-carriers and amphibious colonization).</p>
    <p>Centauri subdecadence maps Zone-7 onto the active side of the Second (or Right) Pylon on the Atlantean Cross. As the light aspect of Genesis (‘creative influences’) it corresponds to genealogy, ancestor worship and inherited wealth.</p>
    <p>Stillwell links Zone-7 to the Munumese quasiphonic particle ‘pb’ (the Horowitzean ‘compounded plosive’).</p>
    <p>Her ethno-topography of the Nma allocates Zone-4 to the coastal swamps of the Dib Nma, and through the Mu Nma hydrocycle mythos to salt-water marshes.</p>
    <p>Zone-7 totem animals are predominantly of the chubby batrachian (burping toad) type.</p>

    <h2>Zone Eight</h2>
    <h3>The Numeral 8</h3>
    <p>The figure eight (8) is a partially rotated glyph of infinity, and also of the Moebian strip. It has strong ophidian resonances, linked in Indian culture to the realm of snake-demons (Nagas), and to the serpent of the deep (Ahi). In the West it is related to Ourobouros (the serpent of eternity, eating its own tail).</p>
    <p>The figure ‘8' designates the number eight, the fourth even number, and the third non-prime (with prime factors 2 x 2 x 2).</p>
    <p>Multiple evidences indicate that eight was an important modulus in the late pre-history of numeracy (most remarkable in this respect is the strong connection between the words for ‘nine' and ‘new' in various languages, including Latin).</p>
    <p>Eight is the third power of two (with factors 1, 2, and 4), and constitutes a crucial grouping in digital electronics (with eight bits equalling one byte (with a power of combinatorial variation equal to two-hundred and fifty-six). It is the same set of numerical features that support the octave of western music.</p>
    <p>Eight digitally cumulates to thirty-six.</p>
    <p>Numeric Keypad direction: North.</p>
    <p>The ophidian tendency in the figure eight is compunded by the deep association of the number with cephalopodian entities - pre-eminently the octopus - and by derivation with the entire range of ‘tentacle-face' beings (such as the Oankali of Octavia Butler). A further - more tenuous - connection might be made to the amphibian hybrids of Dr Octagon (‘half shark-alligator, half man').</p>
    <p>Both numerically and figurally, eight is associated with perfection (in the sense of macrocosmic completion and return). These are particularly notable in the East, where obvious references include the Buddhist eightfold path, and the eight immortals of Taoism. The number eight - particularly in its triplicate reiteration (888) is considered an especially auspicious number in Chinese culture.</p>
    <p>According to the Dogon, eight is the number of Nomo, and as such the primary key to their cosmo-numerical system.</p>
    <p>Eight is the digital source (by cumulation to the second power) of the number of the beast, 666 (see Six).</p>
    <h3>The Eighth Planet: Neptune</h3>
    <p>Neptune (or Sol-8) is the outermost gas-giant, with a mean orbital distance from the sun of approx. 4 504 000 000 km. Due to eccentricities in the orbit of Pluto it is periodically the outermost (ninth) planet (see Pluto, Zone-9). The Neptunian year is slightly under 164.8 Earth-years in length. Its day lasts for approximately sixteen hours.</p>
    <p>Neptune has eight known moons, of which Triton is by far the largest. It also has at least five (thin and dark) rings.</p>
    <p>Neptune shares various features with Uranus, including an anomolously oriented magnetic field, and a bluish hue (due to absorption of red-light by atmospheric methane).</p>
    <p>The prediction of Neptune's existence, and its subsequent discovery in 1846 (on the basis of perturbations in the orbit of Uranus) was a crucial moment of consolidation for mathematical celestial mechanics.</p>
    <p>In Roman mythology Neptune is the sea god (identified with the Greek Poseidon).</p>
    <p>In Lemurian Planetwork Neptune is astrozygonomously paired with Mercury.</p>

    <h2>Zone Nine</h2>
    <h3>The Numeral 9</h3>
    <p>The figure nine (9) is zygospirally related to the figure six (6, see six), and quasisymmetric with the sign for Pluto.</p>
    <p>The figure ‘9' designates the number nine, the fifth odd number (with odditude of three), and the fourth non-prime (with prime factors 3 x 3).</p>
    <p>Nines are produced by unit subtractions (n -1) from pure decimal magnitudes (a numerical practice most frequently encountered in a retail context, e.g. $9.99). In order to produce arithmetical consistency in respect to 1/3 x 3, one is mathematically equated with point nine recurring (0.999...). This equation - which provides a virtual infinite decimal-expansion for every number - is indispensable for Cantorean diagonalization.</p>
    <p>Nine digitally cumulates to forty-five.</p>
    <p>Numeric Keypad direction: North-East.</p>
    <p>The number nine has a null value in digital reduction, practically enabling all nines to be eliminated from any complex reduction (involving at least one digit other than nine or zero). The same formula (9 = 0) is also derivable from Barker twinning (or Zygonovism) - long familiar to Dogon sorcery - for which nine functions as the summative key. Such zygonovism (or nine-sum coupling) divides the decimal numerals into five twins, and underlies both Numogram syzygetics and the game of Subdecadence.</p>
    <p>The number nine is the last numeral of the decimal system, and its associations with death and fatality are primarily based on this purely numerical (modular) function of termination. There are nine rivers of the underworld, and the mortuary aspect of the cat is indicated by her nine lives. Charles Manson's adoption of the Beatle's Revolution-9 (or Revelation IX) as an apocalyptic ‘family anthem' was fully in keeping with this aspect of the number.</p>
    <p>Alternatively, nine is acknowledged as the highest numeral, and associated with celestial inspiration (the nine muses) and bliss (Cloud-9). Nine solar planets are recognized by modern astronomy (as also by the ancient Lemurian Planetwork).</p>
    <p>The duplicate reiteration of nine is remarkable for it's theomystical resonances. Islam (= 99) lists ninety nine ‘incomparable attributes' of Allah. The Anglossic value of YHVH = 99. According to the cryptic Black Atlantean cargo-cult Hyper-C the number ninety-nine - as dramatized by the Y2K panic - designates the cyclic completion of time.</p>
    <h3>The Ninth Planet: Pluto</h3>
    <p>Pluto (or Sol-9) has the most highly elliptical orbital trajectory of any planet in the Solar-system, with a (highly variable) mean orbital distance from the sun of approx. 5 913 520 000 km. Due to the extreme eccentrity of its orbit, Pluto periodically switches places with Neptune as eighth planet from the Sun. The Plutonian year is approximately under 247.7 Earth-years in length.</p>
    <p>Pluto was not discovered until 1930. It's anomalous orbit, which is both abnormally elliptical and also angled off the ecliptic, has led many to the conclusion that it is not a normal planet at all. Suggestions as to its nature include the hypothesis that it is a captured or adopted body (perhaps from the Kuiper Belt of Trans-Neptunian objects), or alternatively an escaped Neptunian moon.</p>
    <p>Pluto has one known moon, Charon (discovered in 1978, and named after the ferryman who guides the dead across the river Styx). Charon is the largest satellite relative to its ‘parent' planet in the Solar-system.</p>
    <p>In Roman mythology Pluto is the god of the underworld (identified with the Greek Hades). The topographically twisted association of the innermost with the outermost - technically described as ‘Plutonic-looping' - is exemplified by the identification of the most distant planet with the inner core of the Earth.</p>
    <p>The existence of Pluto was anticipated by H.P.Lovecraft, who named the as-yet-unknown planet Yuggoth.</p>
    <p>In Lemurian Planetwork Pluto is astrozygonomously paired with the Sun.</p>
