<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moe-Chan & The Oracle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="metro-bg">
        <div class="metro-sunburst"></div><div class="metro-halftone"></div>
        <div class="metro-vectors">
            <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
                <path d="M-100 700 Q 400 400, 900 800 T 1600 500 L 1600 1000 L -100 1000 Z" fill="#000" fill-opacity="0.15" />
                <circle cx="1200" cy="750" r="180" fill="none" stroke="#fff" stroke-width="40" stroke-opacity="0.15" />
            </svg>
        </div>
    </div>

    <!-- Password Screen -->
    <div id="password-screen">
        <div class="pw-creature"><img src="./sleep.png" alt="sleeping"></div>
        <h1>Moe-Chan<br>is sleeping...</h1>
        <input type="password" id="pw-input" placeholder="• • • •" autofocus>
        <p class="pw-error" id="pw-error"></p>
    </div>

    <!-- Main App -->
    <div id="app" style="display:none;">
        <div class="top-bar glass">
            <h2>Moe-Chan</h2>
            <div class="top-controls">
                <button class="btn-theme" onclick="toggleTheme()">🌙</button>
                <span class="streak-badge" id="streak-badge">🔥 0 day streak</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="home">🏠 Home</button>
            <button class="tab-btn" data-tab="calendar">📅 Calendar</button>
            <button class="tab-btn" data-tab="dictionary">📖 Dictionary</button>
            <button class="tab-btn" data-tab="iching">☯️ Oracle</button>
        </div>

        <div class="tab-content active" id="tab-home">
            <div class="creature-area glass">
                <div class="creature-sprite"><img src="./idle.png" id="sprite-img"></div>
                <div class="speech-bubble">
                    <div class="speech-line"><span id="speech-en">Hello!</span></div>
                </div>
                <div class="mood-bar">
                    <div class="mood-track"><div class="mood-fill" id="mood-fill"></div></div>
                </div>
                <div class="random-bubble glass-strong"><span id="random-phrase"></span></div>
            </div>
        </div>

        <div class="tab-content" id="tab-calendar">
            <div class="calendar-section glass-dark">
                <div class="cal-header">
                    <button onclick="changeMonth(-1)">◀</button>
                    <h2 id="cal-month-year"></h2>
                    <button onclick="changeMonth(1)">▶</button>
                </div>
                <div class="cal-grid" id="cal-grid"></div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
