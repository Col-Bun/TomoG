<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accurate 1:1 Numogram</title>
<style>
  body {
    background-color: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  
  .numogram-container {
    width: 100%;
    max-width: 900px;
    background: #000;
    position: relative;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Typography for labels */
  .label-region { font-family: 'Arial Black', sans-serif; font-weight: 900; font-size: 28px; fill: #fff; text-decoration: underline; }
  .label-sub { font-family: 'Arial', sans-serif; font-weight: bold; font-size: 18px; fill: #22dd22; }
  .label-sub-italic { font-style: italic; }
  .label-current { font-family: 'Arial Black', sans-serif; font-weight: 900; font-size: 24px; fill: #fff; }
  .label-sound { font-family: 'Arial', sans-serif; font-weight: bold; font-style: italic; font-size: 16px; }
  
  /* Zones and Text */
  .zone-text { font-family: 'Arial Black', sans-serif; font-weight: 900; font-size: 32px; }
  .zone-polarity { font-family: 'Arial', sans-serif; font-weight: bold; font-size: 16px; fill: #fff; }
  .gate-text { font-family: 'Arial', sans-serif; font-weight: bold; font-size: 14px; fill: #fff; }

  /* Effects */
  .current-path {
    fill: none;
    stroke: #ffffff;
    stroke-width: 25;
    stroke-linecap: round;
    opacity: 0.35;
    stroke-dasharray: 2 6;
  }
  
  .glow { filter: drop-shadow(0 0 10px rgba(255,255,255,0.8)); }
</style>
</head>
<body>

<div class="numogram-container">
  <svg viewBox="0 0 1000 1200" xmlns="http://www.w3.org/2000/svg">
    
    <!-- DEF FOR MARKERS AND FILTERS -->
    <defs>
      <marker id="arrow-white" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#fff" />
      </marker>
      <marker id="arrow-black" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#000" />
      </marker>
    </defs>

    <!-- STIPPLED CURRENTS -->
    <!-- Sink (5 -> 4 -> 1) -->
    <path d="M 350 320 Q 280 400 300 480" class="current-path" />
    <path d="M 300 480 Q 380 550 500 620" class="current-path" />
    <!-- Hold (7 -> 5) -->
    <path d="M 700 480 Q 550 400 350 320" class="current-path" />
    <!-- Rise (1 -> 7 -> 2) -->
    <path d="M 500 620 Q 620 550 700 480" class="current-path" />
    <path d="M 700 480 Q 680 380 650 300" class="current-path" />
    <!-- Warp (6 -> 3 loop) -->
    <path d="M 600 150 C 500 200 450 180 400 150" class="current-path" stroke-width="40" opacity="0.25" />
    <!-- Plex (1 -> 8 -> 9 -> 0) -->
    <path d="M 500 620 L 500 780" class="current-path" />
    <path d="M 500 780 L 500 920" class="current-path" />
    <path d="M 500 920 C 550 980 550 1020 500 1060" class="current-path" />

    <!-- CURRENT ARROWS (Internal to zones based on B&W image) -->
    <polygon points="415,150 385,140 385,160" fill="#fff" /> <!-- Zone 3 -->
    <polygon points="585,150 615,140 615,160" fill="#fff" /> <!-- Zone 6 -->
    <polygon points="635,300 665,290 665,310" fill="#fff" /> <!-- Zone 2 -->
    <polygon points="365,320 335,310 335,330" fill="#fff" /> <!-- Zone 5 -->
    <polygon points="310,495 290,465 320,475" fill="#fff" /> <!-- Zone 4 -->
    <polygon points="685,480 715,470 715,490" fill="#fff" /> <!-- Zone 7 -->
    <polygon points="500,645 485,615 515,615" fill="#000" /> <!-- Zone 1 (Black arrow on white) -->
    <polygon points="500,755 485,785 515,785" fill="#fff" /> <!-- Zone 8 -->
    <polygon points="500,945 485,915 515,915" fill="#fff" /> <!-- Zone 9 -->
    <polygon points="500,1035 485,1065 515,1065" fill="#fff" /> <!-- Zone 0 -->

    <!-- SOLID TRACTS (LINES) -->
    <g stroke="#fff" stroke-width="2" fill="none">
      <!-- Zone 2 to 5 -->
      <path d="M 650 300 Q 500 350 350 320" />
      <!-- Gate 3 (2 to 3) -->
      <path d="M 650 300 Q 525 225 400 150" />
      <!-- Gate 6 (3 to 6 top) -->
      <path d="M 400 150 Q 500 50 600 150" />
      <!-- Gate 21 (3 to 6 bottom) -->
      <path d="M 400 150 Q 500 250 600 150" />
      <!-- Gate 15 (5 to 6 grand arc) -->
      <path d="M 350 320 C 300 -50 700 -50 600 150" />
      <!-- Gate 10 (4 to 1) -->
      <line x1="300" y1="480" x2="500" y2="620" />
      <!-- Gate 28 (7 to 1) -->
      <line x1="700" y1="480" x2="500" y2="620" />
      <!-- Gate 36 (8 to 9) -->
      <line x1="500" y1="780" x2="500" y2="920" />
      <!-- Gate 1 Loop -->
      <path d="M 500 620 C 400 500 600 500 500 620" />
      <!-- Gate 45 Loop -->
      <path d="M 500 920 C 400 920 400 820 500 920" />
    </g>

    <!-- GATE CIRCLES -->
    <g stroke="#fff" stroke-width="2" fill="#000">
      <circle cx="515" cy="18" r="15" /> <!-- Gate 15 -->
      <circle cx="500" cy="100" r="15" /> <!-- Gate 6 -->
      <circle cx="500" cy="200" r="15" /> <!-- Gate 21 -->
      <circle cx="525" cy="225" r="15" /> <!-- Gate 3 -->
      <circle cx="400" cy="550" r="15" /> <!-- Gate 10 -->
      <circle cx="600" cy="550" r="15" /> <!-- Gate 28 -->
      <circle cx="500" cy="530" r="15" /> <!-- Gate 1 -->
      <circle cx="500" cy="850" r="15" /> <!-- Gate 36 -->
      <circle cx="435" cy="880" r="15" /> <!-- Gate 45 -->
    </g>

    <!-- GATE TEXT -->
    <g class="gate-text" text-anchor="middle" dominant-baseline="central">
      <text x="515" y="18">15</text>
      <text x="500" y="100">6</text>
      <text x="500" y="200">21</text>
      <text x="525" y="225">3</text>
      <text x="400" y="550">10</text>
      <text x="600" y="550">28</text>
      <text x="500" y="530">1</text>
      <text x="500" y="850">36</text>
      <text x="435" y="880">45</text>
    </g>

    <!-- ZONES (CIRCLES) -->
    <g stroke="#fff" stroke-width="3">
      <circle cx="400" cy="150" r="40" fill="#000" /> <!-- Zone 3 -->
      <circle cx="600" cy="150" r="40" fill="#000" /> <!-- Zone 6 -->
      <circle cx="650" cy="300" r="40" fill="#000" /> <!-- Zone 2 -->
      <circle cx="350" cy="320" r="40" fill="#000" /> <!-- Zone 5 -->
      <circle cx="300" cy="480" r="40" fill="#000" stroke="#ff0000" /> <!-- Zone 4 (Red border in Image 1) -->
      <circle cx="700" cy="480" r="40" fill="#000" class="glow" stroke="#ff3366" /> <!-- Zone 7 (Pink glow in Image 1) -->
      <circle cx="500" cy="620" r="50" fill="#fff" class="glow" /> <!-- Zone 1 (White) -->
      <circle cx="500" cy="780" r="40" fill="#000" /> <!-- Zone 8 -->
      <circle cx="500" cy="920" r="40" fill="#000" /> <!-- Zone 9 -->
      <circle cx="500" cy="1060" r="40" fill="#000" /> <!-- Zone 0 -->
    </g>

    <!-- ZONE TEXT (NUMBERS) -->
    <g class="zone-text" text-anchor="middle" dominant-baseline="central">
      <text x="390" y="150" fill="#fff">3</text>
      <text x="590" y="150" fill="#fff">6</text>
      <text x="640" y="300" fill="#fff">2</text>
      <text x="340" y="320" fill="#fff">5</text>
      <text x="290" y="480" fill="#fff">4</text>
      <text x="690" y="480" fill="#fff">7</text>
      <text x="485" y="620" fill="#000">1</text>
      <text x="490" y="780" fill="#fff">8</text>
      <text x="490" y="920" fill="#fff">9</text>
      <text x="490" y="1060" fill="#fff">0</text>
    </g>

    <!-- ZONE TEXT (POLARITIES +/-) -->
    <g class="zone-polarity" text-anchor="middle" dominant-baseline="central">
      <text x="420" y="130">+</text> <!-- 3 -->
      <text x="620" y="130">-</text> <!-- 6 -->
      <text x="670" y="280">-</text> <!-- 2 -->
      <text x="370" y="300">+</text> <!-- 5 -->
      <text x="320" y="460">-</text> <!-- 4 -->
      <text x="720" y="460">+</text> <!-- 7 -->
      <text x="525" y="600" fill="#000">+</text> <!-- 1 -->
      <text x="520" y="760">-</text> <!-- 8 -->
      <text x="520" y="900">+</text> <!-- 9 -->
      <text x="520" y="1040">-</text> <!-- 0 -->
    </g>

    <!-- SOUND LABELS -->
    <g class="label-sound">
      <text x="330" y="130" fill="#22dd22">"zx"</text>
      <text x="630" y="190" fill="#dddd00">"tch"</text>
      <text x="690" y="270" fill="#4488ff">"dt"</text>
      <text x="280" y="360" fill="#ffaa00">"ktt"</text>
      <text x="220" y="520" fill="#ff3333">"skr"</text>
      <text x="750" y="470" fill="#4488ff">"pb"</text>
      <text x="480" y="700" fill="#ddaa00">"gl"</text>
      <text x="430" y="770" fill="#22dd22">"mnm"</text>
      <text x="550" y="910" fill="#dddd00">"tn"</text>
      <text x="410" y="1110" fill="#22dd22">"eiaoung"</text>
    </g>

    <!-- REGION / CURRENT LABELS -->
    <!-- Warp -->
    <text x="50" y="80" class="label-region">Warp</text>
    <text x="50" y="110" class="label-sub label-sub-italic">Hyper-Reality</text>
    <text x="50" y="135" class="label-sub">Djynxx 6::3</text>
    
    <!-- e-Circuit -->
    <text x="50" y="450" class="label-region">e-Circuit</text>
    <text x="50" y="480" class="label-sub label-sub-italic">breakthrough</text>
    <text x="50" y="505" class="label-sub label-sub-italic">connected</text>
    <text x="50" y="530" class="label-sub label-sub-italic">psychoactives</text>
    
    <!-- Plex -->
    <text x="50" y="850" class="label-region">Plex</text>
    <text x="50" y="880" class="label-sub label-sub-italic">Eiriel (Tchukululok)</text>
    <text x="50" y="905" class="label-sub">Dissociative Void</text>
    <text x="50" y="930" class="label-sub">Uttunul 9::0</text>

    <!-- Path Text Overlays -->
    <text x="650" y="110" class="label-current">Warp</text>
    <text x="650" y="135" font-family="Arial" fill="#fff" font-size="16">(Current)</text>
    
    <text x="500" y="370" class="label-current">Hold</text>
    <text x="800" y="300" class="label-current">Rise</text>
    <text x="380" y="570" class="label-current">Sink</text>
    
    <text x="560" y="980" class="label-current">Plex</text>
    <text x="560" y="1005" font-family="Arial" fill="#fff" font-size="16">(Current)</text>

  </svg>
</div>

</body>
</html>
