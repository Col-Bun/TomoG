<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moe-Chan & The Oracle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="metro-bg">
  <div class="metro-sunburst"></div><div class="metro-halftone"></div>
  <div class="metro-vectors">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <path d="M-100 700 Q 400 400, 900 800 T 1600 500 L 1600 1000 L -100 1000 Z" fill="#000" fill-opacity="0.15" />
      <path d="M-100 750 Q 500 300, 1000 750 T 1600 400 L 1600 1000 L -100 1000 Z" fill="#fff" fill-opacity="0.25" />
      <circle cx="1200" cy="750" r="180" fill="none" stroke="#fff" stroke-width="40" stroke-opacity="0.15" />
      <g class="y2k-flower" transform="translate(150, 200) scale(1.5)" fill="#fff" fill-opacity="0.3"><circle cx="0" cy="-20" r="15"/><circle cx="19" cy="-6" r="15"/><circle cx="12" cy="16" r="15"/><circle cx="-12" cy="16" r="15"/><circle cx="-19" cy="-6" r="15"/><circle cx="0" cy="0" r="12" fill="var(--metro-bg1)" fill-opacity="1"/></g>
    </svg>
  </div>
</div>

<div id="password-screen">
  <div class="pw-creature" id="pw-creature"><img src="./sleep.png" alt="sleeping"></div>
  <h1>Moe-Chan<br>is sleeping...</h1>
  <p class="pw-hint">whisper the secret word to wake her up</p>
  <input type="password" id="pw-input" placeholder="• • • •" autofocus>
  <p class="pw-error" id="pw-error"></p>
</div>

<div id="app">
  <div class="top-bar glass">
    <h2>Moe-Chan</h2>
    <div class="top-controls">
      <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">🌙</button>
      <span class="streak-badge" id="streak-badge">🔥 0 day streak</span>
      <span class="date-display" id="date-display"></span>
    </div>
  </div>

  <div class="creature-area glass">
    <div class="creature-sprite" id="creature-sprite"><img src="./idle.png" id="sprite-img" alt="creature"></div>
    <div class="speech-bubble">
      <div class="speech-line"><span class="lang-tag lang-en">EN</span><span id="speech-en">Hello! Let's study today!</span></div>
      <div class="speech-line"><span class="lang-tag lang-jp">JP</span><span id="speech-jp">こんにちは！</span></div>
      <div class="speech-line"><span class="lang-tag lang-es">ES</span><span id="speech-es">¡Hola!</span></div>
    </div>
    <div class="mood-bar">
      <div class="mood-track"><div class="mood-fill" id="mood-fill"></div></div>
      <span class="mood-label" id="mood-text">Neutral</span>
    </div>
    <div class="random-bubble glass-strong" id="random-bubble"><span id="random-phrase"></span><span class="random-lang-tag" id="random-lang-tag"></span></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="home">🏠 Tasks</button>
    <button class="tab-btn" data-tab="calendar">📅 Calendar</button>
    <button class="tab-btn" data-tab="dictionary">📖 Dictionary <span id="dict-tab-count"></span></button>
    <button class="tab-btn" data-tab="sayings">💬 Sayings</button>
    <button class="tab-btn" data-tab="diary">📓 Diary</button>
    <button class="tab-btn" data-tab="history">📊 History</button>
    <button class="tab-btn" data-tab="numogram">🌀 Numogram</button>
    <button class="tab-btn" data-tab="iching">☯️ I-Ching</button>
  </div>

  <div class="tab-content active" id="tab-home">
    <div class="tasks-panel">
        <div class="task-card glass-dark" id="card-flash">
            <h3>📇 Flashcards</h3>
            <div id="flash-input-area"><div class="task-input-row"><input type="number" id="flash-minutes" placeholder="0"><span>min</span></div><button class="btn-glossy log-btn" onclick="logFlashcards()">Log Time</button></div>
            <div id="flash-done" style="display:none">✅ <span id="flash-done-text"></span></div>
        </div>
        <div class="task-card glass-dark" id="card-read">
            <h3>📚 Reading</h3>
            <div id="read-input-area"><div class="task-input-row"><input type="number" id="read-hours" placeholder="0"><span>hrs</span></div><button class="btn-glossy btn-pink log-btn" onclick="logReading()">Log Time</button></div>
            <div id="read-done" style="display:none">✅ <span id="read-done-text"></span></div>
        </div>
    </div>
    <div class="stats-strip">
        <div class="stat-box glass"><div class="num" id="stat-total-flash">0</div><div class="label">Flash</div></div>
        <div class="stat-box glass"><div class="num" id="stat-total-read">0</div><div class="label">Read</div></div>
        <div class="stat-box glass"><div class="num" id="stat-words">0</div><div class="label">Words</div></div>
    </div>
  </div>

  <div class="tab-content" id="tab-calendar">
    <div class="calendar-section glass-dark">
      <div class="cal-jp-date" id="cal-jp-date"></div>
      <div class="cal-header">
        <button onclick="changeMonth(-1)">◀</button>
        <h2 id="cal-month-year"></h2>
        <button onclick="changeMonth(1)">▶</button>
      </div>
      <div class="cal-grid-header"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
      <div class="cal-grid" id="cal-grid"></div>
      <div id="cal-event-editor" class="cal-event-editor" style="display:none;">
        <h4 id="cal-edit-date"></h4>
        <div id="cal-oracle-display" class="cal-oracle-display"></div>
        <input type="text" id="cal-event-input" placeholder="Notes...">
        <button class="btn-glossy btn-green" onclick="saveCalendarEvent()">Save</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-dictionary">
    <div class="dict-section glass-dark">
      <div class="dict-add-form"><input type="text" id="dict-en" placeholder="EN"><input type="text" id="dict-jp" placeholder="JP"><input type="text" id="dict-es" placeholder="ES"><button class="add-btn" onclick="addWord()">+</button></div>
      <div class="dict-list custom-scrollbar" id="dict-list"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-sayings">
    <div class="sayings-section glass-dark">
      <textarea id="saying-input" class="text-area" placeholder="Save a saying..."></textarea>
      <button class="btn-glossy btn-pink" onclick="addSaying()">Save</button>
      <div class="list-container" id="sayings-list"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-diary">
    <div class="diary-section glass-dark">
      <textarea id="diary-input" class="text-area" placeholder="Diary..."></textarea>
      <button class="btn-glossy" onclick="addDiaryEntry()">Save</button>
      <div class="list-container" id="diary-list"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-iching">
    <div class="iching-section glass-dark">
      <div id="daily-oracle-panel" class="daily-oracle-panel">
        <div class="yoji-kanji" id="daily-yoji-kanji"></div>
        <div id="daily-yoji-meaning"></div>
        <div id="daily-pri-name"></div>
      </div>
      <button class="btn-glossy btn-purple" onclick="castOracle()">Cast Coins</button>
      <div class="hexagram-container" id="iching-hex-container">
        <div class="hexagram-visual" id="iching-primary-vis"></div>
        <div class="hexagram-visual" id="iching-secondary-vis"></div>
      </div>
      <div class="iching-result-box" id="iching-primary-result"></div>
    </div>
  </div>

  <div class="tab-content" id="tab-numogram">
      <div class="numogram-wrapper glass-dark" id="numogram-placeholder">
          <p>Numogram Engine Active. Click zones to evaluate.</p>
          <div id="numo-display"></div>
      </div>
  </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
