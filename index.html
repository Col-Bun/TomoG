<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Buddy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap');

  :root {
    --sky1: #0099ff;
    --sky2: #00d4ff;
    --sky3: #66e0ff;
    --green1: #7ec832;
    --green2: #a8e84c;
    --orange: #ff8a00;
    --pink: #ff3c8e;
    --purple: #8b5cf6;
    --glass: rgba(255,255,255,0.18);
    --glass2: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.30);
    --text: #1a2744;
    --text-light: #fff;
    --shadow: rgba(0,60,120,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    color: var(--text);
  }

  /* ===== FRUTIGER AERO BACKGROUND ===== */
  .aero-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(160deg, #1b6b3a 0%, #2d9f4e 12%, #5abe6e 22%, #8dd88a 32%, #c6eeaa 40%, #e8f5cc 46%, #f0f7e0 50%, #d4ecf8 56%, #9ad4f0 64%, #5ab8e8 72%, #2e8ecc 82%, #1a6bb0 92%, #0f4a7a 100%);
    overflow: hidden;
  }

  /* Geometric shapes layer */
  .geo-shapes {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  .geo-shapes .circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
  }

  .geo-shapes .c1 { width: 600px; height: 600px; background: radial-gradient(circle, #fff 0%, transparent 70%); top: -200px; right: -100px; opacity: 0.2; }
  .geo-shapes .c2 { width: 400px; height: 400px; background: radial-gradient(circle, #7ec832 0%, transparent 70%); bottom: -100px; left: -50px; opacity: 0.15; }
  .geo-shapes .c3 { width: 250px; height: 250px; background: radial-gradient(circle, #ff8a00 0%, transparent 70%); top: 40%; left: 60%; opacity: 0.1; }
  .geo-shapes .c4 { width: 180px; height: 180px; background: radial-gradient(circle, #fff 0%, transparent 60%); top: 20%; left: 10%; opacity: 0.12; }

  /* Floating geometric particles */
  .geo-particle {
    position: absolute;
    opacity: 0.08;
    animation: float-particle 20s infinite linear;
  }

  .geo-particle.triangle {
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 50px solid #fff;
  }

  .geo-particle.diamond {
    width: 30px; height: 30px;
    background: #fff;
    transform: rotate(45deg);
  }

  .geo-particle.ring {
    width: 60px; height: 60px;
    border: 4px solid #fff;
    border-radius: 50%;
  }

  .geo-particle.p1 { top: 15%; left: 5%; animation-delay: 0s; animation-duration: 25s; }
  .geo-particle.p2 { top: 60%; left: 85%; animation-delay: -5s; animation-duration: 30s; }
  .geo-particle.p3 { top: 80%; left: 20%; animation-delay: -10s; animation-duration: 22s; }
  .geo-particle.p4 { top: 30%; left: 70%; animation-delay: -3s; animation-duration: 28s; }
  .geo-particle.p5 { top: 10%; left: 50%; animation-delay: -8s; animation-duration: 35s; }
  .geo-particle.p6 { top: 50%; left: 40%; animation-delay: -12s; animation-duration: 20s; }

  @keyframes float-particle {
    0% { transform: translateY(0) rotate(0deg); }
    25% { transform: translateY(-30px) rotate(90deg); }
    50% { transform: translateY(10px) rotate(180deg); }
    75% { transform: translateY(-20px) rotate(270deg); }
    100% { transform: translateY(0) rotate(360deg); }
  }

  /* ===== GLASS PANEL STYLE ===== */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid var(--glass-border);
    border-radius: 24px;
    box-shadow: 0 8px 32px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.25);
  }

  .glass-strong {
    background: rgba(255,255,255,0.30);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1.5px solid rgba(255,255,255,0.45);
    border-radius: 24px;
    box-shadow: 0 8px 32px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.4);
  }

  /* ===== GLOSSY BUTTON ===== */
  .btn-glossy {
    border: none;
    padding: 10px 24px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(180deg, #ff8a00 0%, #e06500 100%);
    box-shadow: 0 4px 14px rgba(255,138,0,0.35), inset 0 1px 0 rgba(255,255,255,0.35);
    transition: all 0.2s;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .btn-glossy:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,138,0,0.4); }
  .btn-glossy:active { transform: translateY(0); }

  /* Reconstructed Green Button */
  .btn-green {
    background: linear-gradient(180deg, var(--green2) 0%, var(--green1) 100%);
    box-shadow: 0 4px 14px rgba(126, 200, 50, 0.35), inset 0 1px 0 rgba(255,255,255,0.35);
  }
  
  .btn-green:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(126, 200, 50, 0.5); }

  /* Reconstructed UI Layout */
  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  
  .dashboard {
    width: 100%;
    max-width: 800px;
    padding: 40px;
    text-align: center;
  }
  
  .dashboard h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 3rem;
    margin-bottom: 20px;
    color: var(--text);
  }
  
  .dashboard p {
    font-size: 1.2rem;
    margin-bottom: 30px;
  }
  
  .button-group {
    display: flex;
    gap: 15px;
    justify-content: center;
  }

</style>
</head>
<body>

  <!-- Frutiger Aero Background -->
  <div class="aero-bg"></div>
  <div class="geo-shapes">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="circle c4"></div>
  </div>
  
  <div class="geo-lines">
    <!-- Placeholder for vector lines if you had SVG here -->
  </div>

  <!-- Floating Particles -->
  <div class="geo-particle triangle p1"></div>
  <div class="geo-particle diamond p2"></div>
  <div class="geo-particle ring p3"></div>
  <div class="geo-particle triangle p4"></div>
  <div class="geo-particle diamond p5"></div>
  <div class="geo-particle ring p6"></div>

  <!-- Main Content -->
  <div class="container">
    <div class="glass-strong dashboard">
      <h1>Study Buddy</h1>
      <p>Your session is ready to begin.</p>
      
      <div class="button-group">
        <button class="btn-glossy">Get Started</button>
        <button class="btn-glossy btn-green">View Notes</button>
      </div>
    </div>
  </div>

</body>
</html>
